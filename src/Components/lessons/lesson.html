<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../public/css/components/lesson.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>

  <!-- TOP NAV -->
  <header class="topbar">
    <nav class="topbar-left">
      <a href="../../index.html" class="back-btn home-btn" title="All courses">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </a>
      <span class="breadcrumb-sep">/</span>
      <a id="back-btn" href="../courses/responsive-web-design.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
        </svg>
        Course
      </a>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-module" id="breadcrumb-module">Basic HTML</span>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-title" id="breadcrumb-title">Say Hello to HTML Elements</span>
    </nav>
    <div class="topbar-right">
      <span class="badge-type" id="lesson-badge">Lab</span>
      <button class="btn-reset" id="btn-reset" title="Reset to original code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Reset
      </button>
    </div>
  </header>


  <!-- MAIN LAYOUT -->
  <div class="workspace">

    <!-- LEFT PANEL: Description -->
    <aside class="panel panel-desc" id="panel-desc">
      <div class="panel-header">
        <span class="panel-label">Instructions</span>
      </div>
      <div class="panel-body">
        <div class="lesson-meta">
          <span class="lesson-module-tag" id="meta-module"></span>
        </div>
        <h1 class="lesson-title" id="lesson-title"></h1>
        <p class="lesson-description" id="lesson-description"></p>

        <div class="objectives-block">
          <h3 class="objectives-heading">What you'll learn</h3>
          <ul class="objectives-list" id="objectives-list"></ul>
        </div>
      </div>
      <div class="resize-handle" id="resize-desc" data-panel="desc"></div>
    </aside>

    <!-- CENTER PANEL: Editor -->
    <section class="panel panel-editor">
      <div class="panel-header">
        <div class="file-tabs" id="file-tabs"></div>
        <div class="editor-actions">
          <button class="run-btn" id="run-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            Run
          </button>
        </div>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="line-numbers"></div>
        <div class="highlight-wrap">
          <pre class="highlight-pre" id="highlight-pre" aria-hidden="true"><code class="highlight-code" id="highlight-code"></code></pre>
          <textarea class="code-editor" id="code-editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
        </div>
      </div>
    </section>

    <!-- DIVIDER -->
    <div class="panel-divider" id="panel-divider"></div>

    <!-- RIGHT PANEL: Preview -->
    <section class="panel panel-preview">
      <div class="panel-header">
        <span class="panel-label">Preview</span>
        <div class="preview-status" id="preview-status">
          <span class="status-dot"></span>
          <span class="status-text">Live</span>
        </div>
      </div>
      <iframe class="preview-frame" id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
    </section>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="../../js/lessonViewer.js"></script>
</body>
</html>
